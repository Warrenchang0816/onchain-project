version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: chore
    open-pull-requests-limit: 5

  - package-ecosystem: gomod
    directory: "/go-service"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: chore
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: "/react-service"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: chore
    ignore:
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: "/task-reward-vault"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: chore
    open-pull-requests-limit: 5
